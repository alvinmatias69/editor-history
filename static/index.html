<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Editor History</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="/style.css">
    </head>
    <body class="bg-dark-subtle container overflow-hidden">
        <div class="position-absolute top-50 start-50 translate-middle  bg-light-subtle shadow rounded w-75 h-100 mt-7">
            <div class="position-absolute top-35 start-50 translate-middle text-center">
                <h1 class="fw-bold">
                    Write With Authenticity
                    <br/>
                    <small class="text-body-secondary">Complete With Editing History</small>
                </h1>
                <br/>
                <button type="button" class="btn btn-primary btn-lg" id="create">
                    Create A New Document
                </button>
                <button type="button" class="btn btn-secondary btn-lg" id="loading" disabled style="display:none;">
                    <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
                    <span role="status">Creating Your Document...</span>
                </button>
            </div>
        </div>


        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div id="toast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="d-flex">
                    <div class="toast-body">
                        Error creating document, please try again
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script type="text/javascript" src="./landing.js"></script>
    </body>
</html>
